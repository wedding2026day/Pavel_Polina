<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Свадебное приглашение</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- БЛОК 1 -->

  <section class="block1 animate">
    <img class="block1-img" src="img/1.png" alt="">
  </section>

    <!-- БЛОК 2 -->

  <section class="block2">

    <!-- ВЕРХНЕЕ ФОТО -->
    <img class="block2-img animate" src="img/2.png" alt="">

    <!-- НИЖНЕЕ ФОТО -->
    <div class="block2-bottom animate">

      <img class="block2-img" src="img/3.png" alt="">

      <!-- КНОПКА -->
      <a
        class="block2-btn"
        href="https://yandex.ru/maps/-/CPsoyL-Q"
        target="_blank"
      >
        <img src="img/10.png" alt="">
      </a>

    </div>

  </section>

    <!-- БЛОК 3 -->

    <section class="block3">

      <!-- ФОТО 1 (которое заходит на блок 2) -->
      <img class="block3-img top animate" src="img/4.png" alt="">

      <!-- ФОТО 2 -->
      <img class="block3-img animate" src="img/5.png" alt="">

    </section>


      <!-- БЛОК 4 -->

    <section class="block4 animate">

      <!-- ФОТО 1 (которое заходит на блок 2) -->
      <img class="block4-img top" src="img/6.png" alt="">

    </section>

      <!-- БЛОК 5 -->

    <section class="block5">

      <!-- ФОТО 1 (которое заходит на блок 2) -->
      <img class="block5-img top animate" src="img/7.png" alt="">

      <!-- ФОТО 2 -->
      <img class="block5-img animate" src="img/8.png" alt="">

    </section>

      <!-- БЛОК 6 -->

    <section class="block1 animate">
      <img class="block1-img" src="img/9.png" alt="">

      <!-- ФОРМА -->

<section class="form-section">

  <form
    class="wedding-form"
    id="wedding-form"
    action="https://api.web3forms.com/submit"
    method="POST"
  >

    <!-- WEB3FORMS KEY -->
    <input
      type="hidden"
      name="access_key"
      value="b83fb939-af74-4200-acd3-eed613c8deef"
    >

    <!-- ФИО -->
    <input
      class="form-input"
      type="text"
      name="name"
      data-label="ФИО"
      placeholder="Ваше ФИО"
      required
    >

    <!-- ФИО +1 -->
    <input
      class="form-input"
      type="text"
      name="plus_one"
      data-label="ФИО +1"
      placeholder="ФИО +1 (необязательно)"
    >

    <!-- ПРИСУТСТВИЕ -->

    <div class="form-group">

      <p class="form-title">
        Вы сможете присутствовать на торжестве?
      </p>

      <label class="radio-label">
        <input
          type="radio"
          name="attendance"
          data-label="Присутствие"
          value="Да, с удовольствием"
          required
        >
        <span>Да, с удовольствием</span>
      </label>

      <label class="radio-label">
        <input
          type="radio"
          name="attendance"
          data-label="Присутствие"
          value="К сожалению, не смогу"
        >
        <span>К сожалению, не смогу</span>
      </label>

    </div>

    <!-- АЛКОГОЛЬ -->

    <div class="form-group">

      <p class="form-title">
        Какой алкоголь предпочитаете?
      </p>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Водка">
        <span>Водка</span>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Коньяк">
        <span>Коньяк</span>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Белое вино">
        <span>Белое вино</span>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Красное вино">
        <span>Красное вино</span>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Шампанское">
        <span>Шампанское</span>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Виски">
        <span>Виски</span>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Ром">
        <span>Ром</span>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Самогон">
        <span>Самогон</span>
      </label>

      <label class="checkbox-label">
        <input type="checkbox" name="alcohol[]" data-label="Алкоголь" value="Не пью">
        <span>Не пью</span>
      </label>

    </div>

    <!-- АЛЛЕРГИИ -->

    <div class="form-group">

      <p class="form-title">
        Есть ли у Вас аллергии и пищевые ограничения?
      </p>

      <label class="checkbox-label">
        <input
          type="checkbox"
          name="restrictions"
          data-label="Ограничения"
          value="Не ем мясо"
        >
        <span>Не ем мясо</span>
      </label>

      <input
        class="form-input"
        type="text"
        name="allergy"
        data-label="Аллергия"
        placeholder="Аллергия на продукт"
      >

    </div>

     <!-- МУЗЫКАЛЬНАЯ КОМПОЗИЦИЯ -->

<div class="form-group">

  <p class="form-title">
    Какую музыкальную композицию вы бы хотели услышать на свадьбе?
  </p>

  <input
    class="form-input"
    type="text"
    name="Музыкальная композиция"
    placeholder="Напишите название"
  >

</div>


    <!-- КНОПКА -->

<button class="submit-btn" type="submit">
  <img src="img/11.png" alt="">
</button>

<p class="form-success">
  Анкета отправлена ✨
</p>

  </form>

</section>

    </section>

  <script src="script.js"></script>
</body>
</html>
